<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hub de Leitura - Cadastro</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
    input { width: 100%; padding: 8px; margin: 4px 0; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 10px; }
    .invalid-feedback { color: red; font-size: 12px; display: none; }
    .form-group { margin-bottom: 15px; }
  </style>
</head>
<body>
  <h2>Cadastro - Hub de Leitura</h2>
  <form id="register-form">
    <div class="form-group">
      <input type="text" id="name" placeholder="Nome completo">
      <div class="invalid-feedback">Nome deve ter pelo menos 2 caracteres</div>
    </div>
    <div class="form-group">
      <input type="email" id="email" placeholder="E-mail">
    </div>
    <div class="form-group">
      <input type="tel" id="phone" placeholder="Telefone">
    </div>
    <div class="form-group">
      <input type="password" id="password" placeholder="Senha">
    </div>
    <div class="form-group">
      <input type="password" id="confirm-password" placeholder="Confirmar senha">
    </div>
    <div class="form-group">
      <input type="checkbox" id="terms-agreement"> Aceito os termos
    </div>
    <button type="button" id="register-btn" onclick="register()">Criar Conta</button>
  </form>
  <script>
    function register() {
      const name = document.getElementById('name').value;
      const feedback = document.querySelector('.form-group:nth-child(1) .invalid-feedback');
      if (!name || name.length < 2) {
        feedback.style.display = 'block';
        return;
      }
      feedback.style.display = 'none';
      const email = document.getElementById('email').value;
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      users.push({ name, email, password: document.getElementById('password').value });
      localStorage.setItem('users', JSON.stringify(users));
      localStorage.setItem('loggedUser', name);
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
